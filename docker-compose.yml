services:
  db:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=sanctuary
      - POSTGRES_PASSWORD=sanctuary
      - POSTGRES_DB=sanctuary
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sanctuary"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - HOST=0.0.0.0
      - DATABASE_URL=postgresql+psycopg://sanctuary:sanctuary@db:5432/sanctuary
      - REDIS_URL=redis://redis:6379/0
      - CELERY_TASK_ALWAYS_EAGER=false
    volumes:
      - ./data:/app/data
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Two-queue split (see app/tasks/celery_app.py): heavy Docling/OCR is pinned to
  # `ingest` (concurrency UI-controlled, default 4 — see get_ocr_concurrency /
  # app/services/ocr_slots.py for the matching per-page semaphore); LLM/
  # embeddings/light I/O run on `ai`.
  # --max-tasks-per-child recycles pool children to cap RSS creep (Docling/torch);
  # --without-{gossip,mingle,heartbeat} trims chatter for this small static cluster.
  # The entrypoint resolves --concurrency from the DB (UI-controlled, see
  # docker/worker-ingest-entrypoint.sh) so a Settings change survives restarts.
  worker-ingest:
    build: .
    restart: unless-stopped
    command: ["sh", "/app/docker/worker-ingest-entrypoint.sh"]
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+psycopg://sanctuary:sanctuary@db:5432/sanctuary
      - REDIS_URL=redis://redis:6379/0
      - CELERY_TASK_ALWAYS_EAGER=false
    volumes:
      - ./data:/app/data
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Also hosts the beat scheduler via -B (5-min pipeline-recovery cron, gmail
  # sync, scan polling, …). Exactly one beat may run cluster-wide, so ONLY this
  # service carries -B — worker-ingest must not. Beat runs in the worker's main
  # process, unaffected by --max-tasks-per-child child recycling.
  # The entrypoint resolves --concurrency from the DB (UI-controlled, see
  # docker/worker-ai-entrypoint.sh) so a Settings change survives restarts.
  worker-ai:
    build: .
    restart: unless-stopped
    command: ["sh", "/app/docker/worker-ai-entrypoint.sh"]
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+psycopg://sanctuary:sanctuary@db:5432/sanctuary
      - REDIS_URL=redis://redis:6379/0
      - CELERY_TASK_ALWAYS_EAGER=false
    volumes:
      - ./data:/app/data
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  db_data:
  redis_data:
