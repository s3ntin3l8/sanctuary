services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - HOST=0.0.0.0
      - REDIS_URL=redis://redis:6379/0
      - CELERY_TASK_ALWAYS_EAGER=false
    volumes:
      - ./data:/app/data
    depends_on:
      redis:
        condition: service_healthy

  # Two-queue split (see app/tasks/celery_app.py): heavy Docling/OCR is pinned to
  # `ingest` (concurrency=1, serialized); LLM/embeddings/light I/O run on `ai`.
  worker-ingest:
    build: .
    restart: unless-stopped
    command: python -m celery -A app.tasks.celery_app worker -n ingest@%h --loglevel=INFO -Q ingest --concurrency=1
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_TASK_ALWAYS_EAGER=false
    volumes:
      - ./data:/app/data
    depends_on:
      redis:
        condition: service_healthy

  worker-ai:
    build: .
    restart: unless-stopped
    command: python -m celery -A app.tasks.celery_app worker -n ai@%h --loglevel=INFO -Q ai --concurrency=2
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_TASK_ALWAYS_EAGER=false
    volumes:
      - ./data:/app/data
    depends_on:
      redis:
        condition: service_healthy

  # Beat scheduler — drives the 5-min pipeline-recovery cron, gmail sync, scan
  # polling, etc. Exactly one beat process may run cluster-wide.
  beat:
    build: .
    restart: unless-stopped
    command: python -m celery -A app.tasks.celery_app beat --loglevel=INFO
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_TASK_ALWAYS_EAGER=false
    volumes:
      - ./data:/app/data
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis_data:
