name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    permissions:
      contents: read
    uses: s3ntin3l8/.github/.github/workflows/ci-python.yml@main
    with:
      python-version: "3.12"
      coverage-source: "app"
      # Measured ~70% locally (full suite, e2e skipped). Floor set below that for
      # margin; ratchet up as coverage grows. Codecov tracks the exact number.
      coverage-fail-under: "65"
      # Route lint-and-test to the homelab self-hosted runner (idle, 8 cores) instead
      # of GitHub-hosted. Safe here: repo is private with 0 forks, so no fork-PR
      # code-execution risk.
      runner: "gh-runner-01"
      # mypy/pip-audit are newly wired up (see requirements-dev.txt). This is a single
      # combined gate for both. mypy baseline is now clean (app/models/database.py
      # migrated to Mapped[]/mapped_column(), 0 errors across app/). pip-audit is NOT
      # clean yet — 18 known vulnerabilities across 8 packages (cryptography, mako,
      # pillow, pip, pydantic-settings, starlette, transformers, virtualenv) as of
      # 2026-07-12; several imply major-version bumps (pillow 10→12, transformers
      # 4→5) that need their own compatibility pass. Flip to true once pip-audit is
      # also clean.
      strict-checks: false
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  e2e:
    # Sanctuary-specific (needs Redis + a live server), so it lives here rather
    # than the shared ci-python.yml. Runs on the homelab runner: has Docker for
    # Redis and a persistent Playwright browser cache across runs.
    runs-on: gh-runner-01
    timeout-minutes: 15
    # Advisory until proven reliably green on the runner — a flaky E2E job
    # should not block merges. Revisit once it's had a few clean weeks.
    continue-on-error: true
    permissions:
      contents: read
    env:
      CELERY_TASK_ALWAYS_EAGER: "true"
      # app/main.py refuses to boot with the default session secret while
      # AUTH_ENABLED=true (the repo default) — a throwaway value scoped to this
      # ephemeral CI run, not a real secret.
      SESSION_SECRET: "ci-e2e-ephemeral-not-a-real-secret" # pragma: allowlist secret
      AUTH_ENABLED: "false"
      # Matches docker-compose.yml's `db` service (published on the default
      # Postgres port) — explicit here so this job doesn't depend on the
      # app's own DATABASE_URL default staying in sync, and to avoid
      # colliding with any other Postgres already running on this persistent
      # self-hosted runner.
      DATABASE_URL: "postgresql+psycopg://sanctuary:sanctuary@localhost:5432/sanctuary"
      # Without this, uvicorn's stdout is block-buffered and gets discarded on
      # `kill` at job end — the "Show app server log" step below then shows a
      # truncated log missing whatever was printed just before the process was
      # killed (including a request's own unhandled-exception traceback).
      PYTHONUNBUFFERED: "1"
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Install Playwright browser
        run: playwright install --with-deps chromium
      - name: Start Postgres + Redis
        # web/worker-* services declare `env_file: .env`, which doesn't exist in CI
        # (gitignored). `up db redis` alone tolerates the missing file, but `stop`
        # validates the whole compose model, so touch a harmless empty one up front.
        run: |
          touch .env
          docker compose up db redis -d --wait
      - name: Diagnose container network reachability
        # Temporary (see PR #107 discussion): the migrations step below has been
        # hitting a persistent "connection refused" against localhost:5432 despite
        # docker compose reporting the db container healthy. This narrows down
        # whether published container ports are reachable from this runner's own
        # shell at all (e.g. runner-is-itself-a-container / Docker-outside-of-
        # Docker topology, where sibling containers' published ports land on the
        # host, not the runner's netns) or whether it's specific to the db
        # service/port. redis (6379) is a second fixed-port compose-published
        # service never otherwise exercised over the network in this job
        # (CELERY_TASK_ALWAYS_EAGER=true bypasses the broker), so it's a clean
        # second data point.
        run: |
          echo "== docker ps =="
          docker ps
          echo "== docker compose port db 5432 =="
          docker compose port db 5432 || true
          echo "== docker compose port redis 6379 =="
          docker compose port redis 6379 || true
          echo "== python socket connect: 127.0.0.1:5432 =="
          python3 -c "
          import socket
          s = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
          s.settimeout(3)
          try:
              s.connect(('127.0.0.1', 5432))
              print('CONNECTED')
          except OSError as e:
              print(f'FAILED: {e}')
          "
          echo "== python socket connect: 127.0.0.1:6379 =="
          python3 -c "
          import socket
          s = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
          s.settimeout(3)
          try:
              s.connect(('127.0.0.1', 6379))
              print('CONNECTED')
          except OSError as e:
              print(f'FAILED: {e}')
          "
          echo "== docker network inspect (bridge gateway/subnet) =="
          docker network inspect "$(docker compose ps -q db | xargs docker inspect -f '{{range $k, $v := .NetworkSettings.Networks}}{{$k}}{{end}}')" --format '{{range .IPAM.Config}}{{.Subnet}} gw={{.Gateway}}{{end}}' || true
      - name: Run migrations
        # docker compose's --wait above only confirms the container's own
        # healthcheck (pg_isready run inside the container) passed -- on this
        # loaded, persistent self-hosted runner that can report healthy an
        # instant before the host-side port mapping actually accepts external
        # connections, so a bare one-shot `alembic upgrade head` can hit a
        # transient "connection refused". Retry with backoff rather than
        # failing the whole job on that race (mirrors the app server step's
        # own curl-retry loop below).
        run: |
          for i in $(seq 1 10); do
            alembic upgrade head && exit 0
            echo "alembic upgrade head failed (attempt $i/10), retrying..."
            sleep 2
          done
          exit 1
      - name: Start app server
        run: |
          uvicorn app.main:app --host 127.0.0.1 --port 8000 > server.log 2>&1 &
          echo $! > server.pid
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:8000 >/dev/null && break
            sleep 1
          done
      - name: Run E2E tests
        run: pytest -m e2e
      - name: Capture runner process/resource state on failure
        # Runs before "Stop app server" kills the uvicorn process, so a live
        # process snapshot is still possible. Diagnostic only (issue #98: a
        # traceback-less 500 with no server-side signal) — investigation
        # already ruled out a stale/zombie uvicorn (runners are ephemeral,
        # one-shot containers, each in its own netns) and host disk/memory
        # pressure (OOMKilled=false, ample disk free at the time). This step
        # exists so the *next* occurrence carries its own evidence instead of
        # requiring a separate runner-side investigation.
        if: failure()
        run: |
          echo "::group::ps aux"
          ps aux
          echo "::endgroup::"
          echo "::group::listening sockets (port 8000 in hex is 1F40)"
          # ss/lsof aren't installed on this runner (confirmed: both
          # "command not found" in a prior #98 capture) -- /proc/net/tcp
          # needs neither. local_address is "<hex IP>:<hex port>"; keep the
          # header plus any matching row so the trailing "inode" column can
          # be cross-referenced to a PID via
          # `ls -l /proc/*/fd 2>/dev/null | grep 'socket:\[<inode>\]'` if
          # ever needed.
          head -1 /proc/net/tcp
          if ! grep -i ':1F40 ' /proc/net/tcp /proc/net/tcp6 2>/dev/null; then
            echo "(nothing on :8000)"
          fi
          echo "::endgroup::"
          echo "::group::load/uptime"
          uptime
          echo "::endgroup::"
          echo "::group::memory"
          free -h
          echo "::endgroup::"
          echo "::group::disk"
          df -h
          echo "::endgroup::"
      - name: Show app server log
        # Server errors (e.g. an unhandled 500 from a route the browser
        # hit) never surface elsewhere — uvicorn's own stdout isn't
        # otherwise visible in this job's log.
        if: always()
        run: cat server.log || true
      - name: Stop app server
        if: always()
        run: kill "$(cat server.pid)" 2>/dev/null || true
      - name: Stop Postgres + Redis
        if: always()
        run: docker compose stop db redis
