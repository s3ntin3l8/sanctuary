name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    permissions:
      contents: read
    uses: s3ntin3l8/.github/.github/workflows/ci-python.yml@main
    with:
      python-version: "3.12"
      coverage-source: "app"
      # Measured ~70% locally (full suite, e2e skipped). Floor set below that for
      # margin; ratchet up as coverage grows. Codecov tracks the exact number.
      coverage-fail-under: "65"
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
