<header class="px-8 h-14 bg-surface-container-low/80 backdrop-blur-xl sticky top-0 z-40 flex items-center justify-between border-b border-outline-variant/10 {% if header_class %}{{ header_class }}{% endif %}">
    <div class="min-w-0 flex flex-1 items-center gap-4 {% if header_back_href %}pl-6{% endif %} {% if header_left_class %}{{ header_left_class }}{% endif %}">
        {% if header_back_href %}
        <a href="{{ header_back_href }}"
           class="material-symbols-outlined text-on-surface-variant hover:text-primary transition-colors text-[18px] shrink-0"
           title="{{ header_back_title or 'Back' }}">arrow_back</a>
        {% endif %}
        <h2 class="shrink-0 text-lg font-black tracking-tighter text-on-surface uppercase">{{ header_title }}</h2>
        {% if header_subtitle %}
        <div class="h-4 w-px bg-outline-variant shrink-0"></div>
        <p class="text-xs font-semibold text-on-surface-variant min-w-0 truncate {% if header_subtitle_class %}{{ header_subtitle_class }}{% endif %}">{{ header_subtitle | safe }}</p>
        {% endif %}
    </div>
    {% if header_actions %}
    <div class="shrink-0 flex items-center gap-3 pl-6 {% if header_actions_class %}{{ header_actions_class }}{% endif %}">
        {{ header_actions | safe }}
    </div>
    {% endif %}
</header>
