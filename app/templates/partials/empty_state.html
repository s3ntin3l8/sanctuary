<div class="{{ container_class | default('flex flex-col items-center justify-center py-24 px-8 text-center') }}">
    <div class="{{ icon_wrapper_class | default('w-16 h-16 bg-surface-container-high rounded-2xl flex items-center justify-center mb-5') }}">
        <span class="material-symbols-outlined {{ icon_class | default('text-3xl text-outline') }}">{{ icon }}</span>
    </div>
    <h3 class="{{ title_class | default('text-lg font-black text-on-surface tracking-tight mb-2') }}">{{ title }}</h3>
    <p class="{{ body_class | default('text-sm text-on-surface-variant max-w-sm leading-relaxed') }}">{{ body }}</p>
    {% if cta_href and cta_label %}
    <a href="{{ cta_href }}" class="{{ cta_class | default('mt-6 btn btn-primary') }}">
        {% if cta_icon %}
        <span class="material-symbols-outlined text-base">{{ cta_icon }}</span>
        {% endif %}
        {{ cta_label }}
    </a>
    {% endif %}
</div>
