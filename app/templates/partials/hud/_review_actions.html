{# Triage review-mode action strip: retry AI pipeline, reingest.
   Only rendered when mode == 'review'. Required: doc
#}
<div class="px-5 py-2.5 border-b border-outline-variant/10 flex items-center gap-2">
  <span class="text-[9px] font-bold uppercase tracking-widest flex-1" style="color:var(--color-outline);">Document</span>
  <button hx-post="/document/{{ doc.id }}/summarize"
          hx-target="#triage-doc-pane"
          hx-swap="innerHTML"
          class="p-1 rounded hover:bg-surface-container-high transition-colors"
          style="color:var(--color-on-surface-variant);"
          title="Generate AI summary">
    <span class="material-symbols-outlined text-base">auto_fix_high</span>
  </button>
  <button hx-post="/triage/document/{{ doc.id }}/retry-ai"
          hx-target="#triage-doc-pane"
          hx-swap="innerHTML"
          class="p-1 rounded hover:bg-surface-container-high transition-colors"
          style="color:var(--color-on-surface-variant);"
          title="Retry full AI pipeline">
    <span class="material-symbols-outlined text-base">smart_toy</span>
  </button>
  <button hx-post="/document/{{ doc.id }}/reingest"
          hx-target="#triage-doc-pane"
          hx-swap="innerHTML"
          class="p-1 rounded hover:bg-surface-container-high transition-colors"
          style="color:var(--color-on-surface-variant);"
          title="Re-run extraction (Docling)">
    <span class="material-symbols-outlined text-base">refresh</span>
  </button>
</div>
