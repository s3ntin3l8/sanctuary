{# Self-refreshing badge slot for the worker queue sidebar button.
   Polls unconditionally every 5s so the badge re-arms after going idle.
#}
<div id="worker-queue-badge-slot"
     hx-get="{{ request.app.url_path_for('worker_queue_badge') }}"
     hx-trigger="every 5s"
     hx-swap="outerHTML"
     hx-sync="this:drop">
    {% if n_active > 0 %}
    <span class="absolute -top-1 -right-1 flex items-center justify-center min-w-[16px] h-4 px-1 bg-tertiary text-on-tertiary text-[9px] font-bold rounded-full border-2 border-surface-container-low animate-pulse">
        {{ n_active }}
    </span>
    {% endif %}
</div>
