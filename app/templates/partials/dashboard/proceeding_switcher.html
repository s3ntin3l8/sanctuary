{# Variables: case, proceedings, active_proceeding #}
<div class="py-1">
  {% for p in proceedings %}
  <a hx-get="/cases/{{ case.id }}?proceeding={{ p.id }}"
     hx-target="#case-dashboard-main"
     hx-swap="outerHTML"
     class="flex items-center gap-3 px-4 py-2.5 cursor-pointer"
     style="text-decoration:none; color:var(--color-on-surface);"
     onmouseover="this.style.background='var(--color-surface-high)'"
     onmouseout="this.style.background=''">
    <span class="font-mono text-[12px] flex-1">{{ p.az_court }}</span>
    <span class="text-[11px] uppercase tracking-wide" style="color:var(--color-on-surface-variant);">{{ p.level }}</span>
    <span class="text-[10.5px] font-mono" style="color:var(--color-on-surface-variant);">
      {% if p.document_count is defined %}{{ p.document_count }}d{% endif %}
    </span>
  </a>
  {% endfor %}
</div>
