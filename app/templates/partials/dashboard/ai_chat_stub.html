{# Mounted outside caseDashboard scope — reads chatOpen from parent via $store or just rendered inside the page #}
<div x-show="chatOpen" x-cloak
     class="fixed inset-y-0 right-0 z-50 flex flex-col slide-in-right"
     style="width:380px; background:var(--color-surface-lowest); border-left:1px solid var(--color-outline-variant); box-shadow:-8px 0 32px rgba(0,0,0,0.35);">
  <div class="flex items-center justify-between px-5 py-4 border-b"
       style="border-color:var(--color-outline-variant);">
    <div class="flex items-center gap-2">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--color-primary)" stroke-width="1.8">
        <path d="M12 3l2 6 6 2-6 2-2 6-2-6-6-2 6-2 2-6z"/>
      </svg>
      <span class="font-semibold text-[14px]" style="color:var(--color-on-surface);">Case AI Chat</span>
    </div>
    <button @click="chatOpen = false" style="color:var(--color-on-surface-variant);">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M6 6l12 12M6 18L18 6"/>
      </svg>
    </button>
  </div>
  <div class="flex-1 flex items-center justify-center p-8 text-center">
    <div>
      <div class="text-[28px] mb-3">✦</div>
      <div class="font-semibold text-[15px] mb-1" style="color:var(--color-on-surface);">Case AI Chat</div>
      <div class="text-[12.5px]" style="color:var(--color-on-surface-variant);">
        Arriving in Phase 7 — full case-aware chat with<br>citation to source documents.
      </div>
    </div>
  </div>
</div>
