<div x-data="{ open: false }" @open-edit-case-modal.window="open = true">
    <template x-teleport="body">
        <div x-show="open" class="relative z-50" aria-labelledby="modal-title" role="dialog" aria-modal="true">
            <div x-show="open" x-transition.opacity class="fixed inset-0 bg-black/60 transition-opacity"></div>
            <div class="fixed inset-0 z-10 w-screen overflow-y-auto">
                <div class="flex min-h-full items-end justify-center p-4 text-center sm:items-center sm:p-0">
                    <div x-show="open" @click.away="open = false" x-transition
                         class="relative transform overflow-hidden rounded-lg bg-surface-container text-left shadow-xl transition-all sm:my-8 sm:w-full sm:max-w-lg border border-outline-variant/30">
                        <div class="px-4 pb-4 pt-5 sm:p-6 sm:pb-4">
                            <h3 class="text-base font-semibold leading-6 text-on-surface" id="modal-title">Edit Case & Proceeding</h3>

                            <!-- Case Edit Form -->
                            <form hx-patch="/cases/{{ case.id }}" class="mt-4 space-y-4">
                                <div>
                                    <label class="block text-xs font-medium text-on-surface-variant">Case Title</label>
                                    <input type="text" name="title" value="{{ case.title }}" class="mt-1 w-full bg-surface border border-outline-variant rounded px-3 py-2 text-sm text-on-surface">
                                </div>
                                <div>
                                    <label class="block text-xs font-medium text-on-surface-variant">Case Status</label>
                                    <select name="status" class="mt-1 w-full bg-surface border border-outline-variant rounded px-3 py-2 text-sm text-on-surface">
                                        <option value="intake"     {% if case.status == 'intake' %}selected{% endif %}>Intake</option>
                                        <option value="discovery"  {% if case.status == 'discovery' %}selected{% endif %}>Discovery</option>
                                        <option value="pre_trial"  {% if case.status == 'pre_trial' %}selected{% endif %}>Pre-trial</option>
                                        <option value="trial"      {% if case.status == 'trial' %}selected{% endif %}>Trial</option>
                                        <option value="post_trial" {% if case.status == 'post_trial' %}selected{% endif %}>Post-trial</option>
                                        <option value="closed"     {% if case.status == 'closed' %}selected{% endif %}>Closed</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="block text-xs font-medium text-on-surface-variant">Case Type</label>
                                    <select name="case_type" class="mt-1 w-full bg-surface border border-outline-variant rounded px-3 py-2 text-sm text-on-surface">
                                        <option value="civil"          {% if case.case_type == 'civil' %}selected{% endif %}>Zivilsache (Civil)</option>
                                        <option value="family"         {% if case.case_type == 'family' %}selected{% endif %}>Familiensache (Family)</option>
                                        <option value="administrative" {% if case.case_type == 'administrative' %}selected{% endif %}>Verwaltungssache (Administrative)</option>
                                        <option value="criminal"       {% if case.case_type == 'criminal' %}selected{% endif %}>Strafsache (Criminal)</option>
                                    </select>
                                </div>
                                <div class="flex items-center gap-3">
                                    <input type="checkbox" id="assume-worst-case-{{ case.id }}" name="assume_worst_case" value="true"
                                           {% if case.assume_worst_case %}checked{% endif %}
                                           class="rounded border-outline-variant">
                                    <div>
                                        <label for="assume-worst-case-{{ case.id }}" class="text-xs font-medium text-on-surface cursor-pointer">Worst-Case-Prognose</label>
                                        <p class="text-[10px] text-on-surface-variant">Gegnerische Anwaltskosten in Risikoberechnung einbeziehen. Bei Familiensachen standardmäßig deaktiviert (§81 FamFG).</p>
                                    </div>
                                </div>
                                <div class="flex justify-end pt-2">
                                    <button type="submit" class="bg-primary text-on-primary px-3 py-1.5 rounded text-sm font-medium hover:bg-primary/90 transition-colors">Save Case</button>
                                </div>
                            </form>

                            <hr class="my-6 border-outline-variant/30">

                            <!-- Proceeding Edit Form -->
                            {% if active_proceeding %}
                            <form hx-patch="/api/v1/proceedings/{{ active_proceeding.id }}" class="space-y-4">
                                <div>
                                    <label class="block text-xs font-medium text-on-surface-variant">Proceeding Court Name</label>
                                    <input type="text" name="court_name" value="{{ active_proceeding.court_name }}" class="mt-1 w-full bg-surface border border-outline-variant rounded px-3 py-2 text-sm text-on-surface">
                                </div>
                                <div>
                                    <label class="block text-xs font-medium text-on-surface-variant">Court Level</label>
                                    <select name="court_level" class="mt-1 w-full bg-surface border border-outline-variant rounded px-3 py-2 text-sm text-on-surface">
                                        <option value="ag"    {% if active_proceeding.court_level == 'ag' %}selected{% endif %}>AG (Amtsgericht)</option>
                                        <option value="lg"    {% if active_proceeding.court_level == 'lg' %}selected{% endif %}>LG (Landgericht)</option>
                                        <option value="olg"   {% if active_proceeding.court_level == 'olg' %}selected{% endif %}>OLG (Oberlandesgericht)</option>
                                        <option value="bgh"   {% if active_proceeding.court_level == 'bgh' %}selected{% endif %}>BGH (Bundesgerichtshof)</option>
                                        <option value="other" {% if active_proceeding.court_level == 'other' %}selected{% endif %}>Other / Unclassified</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="block text-xs font-medium text-on-surface-variant">Aktenzeichen (Court File No)</label>
                                    <input type="text" name="az_court" value="{{ active_proceeding.az_court or '' }}" class="mt-1 w-full bg-surface border border-outline-variant rounded px-3 py-2 text-sm text-on-surface">
                                </div>
                                <div class="flex justify-end pt-2 space-x-2">
                                    <button type="button" @click="open = false" class="px-3 py-1.5 text-sm font-medium text-on-surface-variant hover:bg-surface-container-high rounded transition-colors">Cancel</button>
                                    <button type="submit" class="bg-primary text-on-primary px-3 py-1.5 rounded text-sm font-medium hover:bg-primary/90 transition-colors">Save Proceeding</button>
                                </div>
                            </form>
                            {% endif %}
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </template>
</div>
