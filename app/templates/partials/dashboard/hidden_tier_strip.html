{# Reactive strip — shown/counted via Alpine hiddenCount() so it updates on filter change #}
<div x-show="hiddenCount() > 0"
     x-cloak
     class="sticky bottom-0 z-10 flex items-center gap-2 px-4 pb-3 pt-6 text-[11px] pointer-events-none"
     style="background:linear-gradient(to top, var(--color-surface-low) 55%, transparent);
            color:var(--color-on-surface-variant);">
  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" class="flex-shrink-0">
    <circle cx="12" cy="12" r="9"/><path d="M12 8h.01M11 12h1v5h1"/>
  </svg>
  <span x-text="hiddenCount() + ' document' + (hiddenCount() !== 1 ? 's' : '') + ' hidden by filter'"></span>
  <button class="ml-1 underline-offset-2 hover:underline pointer-events-auto"
          style="color:var(--color-primary);"
          @click="$dispatch('set-filter', { filter: 'all' })">
    show all
  </button>
</div>
