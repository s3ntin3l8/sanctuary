{# Variables: new_docs (list of doc dicts with id, title, originator_color) #}
<div x-show="reviewOpen" x-cloak
     @click.self="reviewOpen = false"
     class="fixed inset-0 z-50 flex items-start justify-center fade-in"
     style="background:rgba(0,0,0,0.55); padding-top:100px;">
  <div class="rounded-xl overflow-hidden"
       style="width:560px; max-width:90vw; max-height:70vh; display:flex; flex-direction:column;
              background:var(--color-surface-lowest); border:1px solid var(--color-outline-variant);
              box-shadow:0 20px 60px rgba(0,0,0,0.5);">
    <div class="flex items-center justify-between px-5 py-4 border-b flex-shrink-0"
         style="border-color:var(--color-outline-variant);">
      <span class="font-semibold text-[14px]" style="color:var(--color-on-surface);">
        What's new since last visit
      </span>
      <button @click="reviewOpen = false" style="color:var(--color-on-surface-variant);">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M6 6l12 12M6 18L18 6"/>
        </svg>
      </button>
    </div>
    <div class="overflow-auto flex-1 custom-scrollbar">
      {% if new_docs %}
        {% for doc in new_docs %}
        <div class="flex items-center gap-3 px-5 py-3 border-b"
             style="border-color:var(--color-outline-variant);"
             onmouseover="this.style.background='var(--color-surface-high)'"
             onmouseout="this.style.background=''">
          <span class="h-2 w-2 rounded-full flex-shrink-0"
                style="background:var(--color-originator-{{ doc.originator_color }});"></span>
          <span class="text-[13px] flex-1" style="color:var(--color-on-surface);">{{ doc.title }}</span>
          <button @click="reviewOpen = false; openDoc({{ doc.id }})"
                  class="text-[11px]" style="color:var(--color-primary);">view →</button>
        </div>
        {% endfor %}
      {% else %}
        <div class="px-5 py-8 text-center text-[13px]" style="color:var(--color-on-surface-variant);">
          No new documents since your last visit.
        </div>
      {% endif %}
    </div>
  </div>
</div>
