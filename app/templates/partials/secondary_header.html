<div class="sticky top-0 bg-surface-container-lowest z-10 border-b border-outline-variant/10 px-8 py-3 {% if secondary_header_class %}{{ secondary_header_class }}{% endif %}">
    <div class="flex items-center justify-between gap-4 {% if secondary_header_inner_class %}{{ secondary_header_inner_class }}{% endif %}">
        <div class="min-w-0 flex items-center gap-6 {% if secondary_header_left_class %}{{ secondary_header_left_class }}{% endif %}">
            {% if secondary_identity %}
            <div class="min-w-0 flex items-center gap-6 {% if secondary_identity_class %}{{ secondary_identity_class }}{% endif %}">
                {{ secondary_identity | safe }}
            </div>
            {% endif %}
            {% if secondary_nav %}
            <nav class="flex gap-6 text-[10px] font-bold tracking-widest uppercase text-on-surface-variant overflow-x-auto custom-scrollbar {% if secondary_nav_class %}{{ secondary_nav_class }}{% endif %}">
                {{ secondary_nav | safe }}
            </nav>
            {% endif %}
        </div>
        {% if secondary_status %}
        <div class="flex items-center shrink-0 {% if secondary_status_class %}{{ secondary_status_class }}{% endif %}">
            {{ secondary_status | safe }}
        </div>
        {% endif %}
    </div>
</div>
