<div id="worker-queue-panel-root"
     x-data="{ open: false }"
     @toggle-worker-queue.window="open = !open"
     @click.outside="open = false"
     x-show="open"
     x-transition:enter="transition ease-out duration-200"
     x-transition:enter-start="opacity-0 -translate-x-4 scale-95"
     x-transition:enter-end="opacity-100 translate-x-0 scale-100"
     x-transition:leave="transition ease-in duration-150"
     x-transition:leave-start="opacity-100 translate-x-0 scale-100"
     x-transition:leave-end="opacity-0 -translate-x-4 scale-95"
     class="fixed bottom-20 left-[72px] w-80 bg-surface-container border border-outline-variant/20 rounded-2xl shadow-2xl z-[9999] overflow-hidden flex flex-col max-h-[70vh] min-h-[140px]"
     x-cloak
     style="display: none;">

    <div class="px-4 py-3 border-b border-outline-variant/10 bg-surface-container-high/50 flex items-center justify-between">
        <h3 class="text-[10px] font-black text-on-surface uppercase tracking-widest">Processing Queue</h3>
        <span class="bg-tertiary/10 text-tertiary text-[9px] font-bold px-2 py-0.5 rounded-full">{{ sidebar_counts.pipeline_active_count }} Active</span>
    </div>

    {# Body — loaded immediately and polls itself #}
    <div hx-get="/api/worker/queue/panel"
         hx-trigger="load"
         hx-swap="outerHTML"
         class="flex-1 overflow-y-auto custom-scrollbar bg-surface-container-lowest/30">
        <div class="p-8 text-center">
            <span class="material-symbols-outlined text-outline/30 text-3xl mb-2 block">hourglass_empty</span>
            <p class="text-[10px] text-on-surface-variant font-bold uppercase tracking-widest">Loading…</p>
        </div>
    </div>

    <div class="p-2 bg-surface-container-high/30 border-t border-outline-variant/10 flex items-center justify-between">
        <a href="/triage" class="text-[8px] font-black text-on-surface-variant hover:text-primary uppercase tracking-widest transition-colors">Open Triage</a>
        <button hx-post="/api/worker/queue/retry-failed"
                hx-target="#worker-queue-panel-body"
                hx-swap="outerHTML"
                class="text-[8px] font-black text-error/60 hover:text-error uppercase tracking-widest transition-colors">
            Retry failed
        </button>
    </div>
</div>
