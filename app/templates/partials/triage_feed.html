{# Triage feed — single-column list of bundle rows.

   Required context: bundles, reactions_by_doc, ORIGINATOR_COLORS
#}
<div id="triage-feed" {% if as_oob %}hx-swap-oob="true"{% endif %}>
    {% if bundles %}
        {% for bundle in bundles %}
            {% include "partials/triage_row.html" %}
        {% endfor %}
    {% else %}
        <div class="flex flex-col items-center justify-center py-24 text-center">
            <div class="w-12 h-12 rounded-full flex items-center justify-center mb-4 bg-primary-container/30 text-primary">
                <span class="material-symbols-outlined text-[22px]">check</span>
            </div>
            <div class="font-headline text-[18px] font-semibold mb-1 text-on-surface">Inbox empty.</div>
            <div class="text-[12.5px] text-on-surface-variant">Nothing to classify right now.</div>
        </div>
    {% endif %}
</div>
