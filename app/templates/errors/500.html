{% extends "base.html" %}

{% block title %}500 - Server Error | The Sanctuary{% endblock %}

{% block content %}
<div class="flex-1 flex items-center justify-center p-8">
    <div class="text-center max-w-md">
        <span class="material-symbols-outlined text-6xl text-error mb-4">warning</span>
        <h1 class="text-2xl font-black text-on-surface mb-2">500 - Server Error</h1>
        <p class="text-sm text-on-surface-variant mb-4">{{ message or "Something went wrong on our end." }}</p>
        <p class="text-xs text-on-surface-variant/60 mb-6">Our team has been notified. Please try again later.</p>
        <a href="{{ request.app.url_path_for('home') }}" class="inline-flex items-center gap-2 text-sm font-bold text-primary bg-primary/10 hover:bg-primary/20 px-5 py-2 rounded-lg transition-colors">
            <span class="material-symbols-outlined text-sm">home</span>
            Return to Home
        </a>
    </div>
</div>
{% endblock %}
