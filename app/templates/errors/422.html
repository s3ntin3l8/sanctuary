{% extends "base.html" %}

{% block title %}422 - Validation Error | The Sanctuary{% endblock %}

{% block content %}
<div class="flex-1 flex items-center justify-center p-8">
    <div class="text-center max-w-md">
        <span class="material-symbols-outlined text-6xl text-error mb-4">rule</span>
        <h1 class="text-2xl font-black text-on-surface mb-2">422 - Validation Error</h1>
        <p class="text-sm text-on-surface-variant mb-6">{{ message or "The request could not be processed due to a validation error." }}</p>
        <a href="{{ request.app.url_path_for('home') }}" class="inline-flex items-center gap-2 text-sm font-bold text-primary bg-primary/10 hover:bg-primary/20 px-5 py-2 rounded-lg transition-colors">
            <span class="material-symbols-outlined text-sm">home</span>
            Return to Home
        </a>
    </div>
</div>
{% endblock %}
