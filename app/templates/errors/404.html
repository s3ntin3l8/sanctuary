{% extends "base.html" %}

{% block title %}404 - Not Found | The Sanctuary{% endblock %}

{% block content %}
<div class="flex-1 flex items-center justify-center p-8">
    <div class="text-center max-w-md">
        <span class="material-symbols-outlined text-6xl text-error mb-4">error</span>
        <h1 class="text-2xl font-black text-on-surface mb-2">404 - Not Found</h1>
        <p class="text-sm text-on-surface-variant mb-6">{{ message or "The page you're looking for doesn't exist." }}</p>
        <a href="/" class="inline-flex items-center gap-2 text-sm font-bold text-primary bg-primary/10 hover:bg-primary/20 px-5 py-2 rounded-lg transition-colors">
            <span class="material-symbols-outlined text-sm">home</span>
            Return to Home
        </a>
    </div>
</div>
{% endblock %}
