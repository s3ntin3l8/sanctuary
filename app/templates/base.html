<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>{% block title %}The Sanctuary | Personal Advocate Case Workspace{% endblock %}</title>
    <script>
        (() => {
            const savedTheme = localStorage.getItem('site-theme');
            const root = document.documentElement;
            const lightTheme = {
                '--color-surface-container-lowest': '#ffffff',
                '--color-surface': '#f8fafb',
                '--color-surface-dim': '#cfdce0',
                '--color-surface-bright': '#f8fafb',
                '--color-surface-container-low': '#f0f4f6',
                '--color-surface-container': '#e8eff1',
                '--color-surface-container-high': '#e1eaec',
                '--color-surface-container-highest': '#d9e4e8',
                '--color-surface-variant': '#d9e4e8',
                '--color-background': '#f8fafb',
                '--color-primary': '#45636b',
                '--color-on-primary': '#ecfaff',
                '--color-primary-container': '#c8e8f2',
                '--color-on-primary-container': '#38565e',
                '--color-error': '#9f403d',
                '--color-error-container': '#fe8983',
                '--color-originator-court': '#0369a1',
                '--color-originator-opposing': '#b91c1c',
                '--color-originator-own': '#047857',
                '--color-originator-unknown': '#64748b',
                '--color-on-surface': '#2a3437',
                '--color-on-surface-variant': '#566164',
                '--color-on-background': '#2a3437',
                '--color-outline': '#727d80',
                '--color-outline-variant': '#a9b4b7',
            };
            const darkTheme = {
                '--color-surface-container-lowest': '#060e20',
                '--color-surface': '#0b1326',
                '--color-surface-dim': '#0b1326',
                '--color-surface-bright': '#31394d',
                '--color-surface-container-low': '#131b2e',
                '--color-surface-container': '#171f33',
                '--color-surface-container-high': '#222a3d',
                '--color-surface-container-highest': '#2d3449',
                '--color-surface-variant': '#2d3449',
                '--color-background': '#0b1326',
                '--color-primary': '#57f1db',
                '--color-on-primary': '#003731',
                '--color-primary-container': '#2dd4bf',
                '--color-on-primary-container': '#00574d',
                '--color-error': '#ffb4ab',
                '--color-error-container': '#93000a',
                '--color-originator-court': '#0369a1',
                '--color-originator-opposing': '#b91c1c',
                '--color-originator-own': '#047857',
                '--color-originator-unknown': '#859490',
                '--color-on-surface': '#dae2fd',
                '--color-on-surface-variant': '#bacac5',
                '--color-on-background': '#dae2fd',
                '--color-outline': '#859490',
                '--color-outline-variant': '#3c4a46',
            };
            const theme = savedTheme === 'dark' ? darkTheme : lightTheme;

            Object.entries(theme).forEach(([key, value]) => {
                root.style.setProperty(key, value);
            });
            root.classList.toggle('dark', savedTheme === 'dark');
        })();
    </script>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&family=Inter:wght@300..700&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    
    <!-- Tailwind CSS Compiled Styles -->
    <link href="/static/styles.css" rel="stylesheet"/>
    <style>
        @keyframes shell-fade-in {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .htmx-added {
            animation: shell-fade-in 220ms ease;
        }

        .htmx-indicator {
            opacity: 0;
            visibility: hidden;
            transition: opacity 180ms ease, visibility 180ms ease;
        }

        .htmx-request .htmx-indicator,
        .htmx-request.htmx-indicator {
            opacity: 1;
            visibility: visible;
        }

        .htmx-request [data-loading-idle] {
            display: none;
        }

        [data-loading-active] {
            display: none;
        }

        .htmx-request [data-loading-active],
        .htmx-request[data-loading-active] {
            display: inline-flex;
        }

        .htmx-request[data-loading-dim],
        .htmx-request [data-loading-dim] {
            opacity: 0.65;
            transition: opacity 180ms ease;
        }
    </style>
</head>
<body class="bg-background font-body text-on-surface flex h-screen overflow-hidden">
    {% include 'partials/sidebar.html' %}
    
    <!-- Main Workspace Container -->
    <main class="flex-1 flex overflow-hidden">
        {% block content %}{% endblock %}
    </main>
    <div id="shell-toast-host" class="pointer-events-none fixed right-6 bottom-6 z-[100] flex flex-col gap-2"></div>
    <script>
        (() => {
            const root = document.documentElement;
            const body = document.body;
            const toastHost = document.getElementById('shell-toast-host');
            const lightTheme = {
                '--color-surface-container-lowest': '#ffffff',
                '--color-surface': '#f8fafb',
                '--color-surface-dim': '#cfdce0',
                '--color-surface-bright': '#f8fafb',
                '--color-surface-container-low': '#f0f4f6',
                '--color-surface-container': '#e8eff1',
                '--color-surface-container-high': '#e1eaec',
                '--color-surface-container-highest': '#d9e4e8',
                '--color-surface-variant': '#d9e4e8',
                '--color-background': '#f8fafb',
                '--color-primary': '#45636b',
                '--color-on-primary': '#ecfaff',
                '--color-primary-container': '#c8e8f2',
                '--color-on-primary-container': '#38565e',
                '--color-error': '#9f403d',
                '--color-error-container': '#fe8983',
                '--color-originator-court': '#0369a1',
                '--color-originator-opposing': '#b91c1c',
                '--color-originator-own': '#047857',
                '--color-originator-unknown': '#64748b',
                '--color-on-surface': '#2a3437',
                '--color-on-surface-variant': '#566164',
                '--color-on-background': '#2a3437',
                '--color-outline': '#727d80',
                '--color-outline-variant': '#a9b4b7',
            };
            const darkTheme = {
                '--color-surface-container-lowest': '#060e20',
                '--color-surface': '#0b1326',
                '--color-surface-dim': '#0b1326',
                '--color-surface-bright': '#31394d',
                '--color-surface-container-low': '#131b2e',
                '--color-surface-container': '#171f33',
                '--color-surface-container-high': '#222a3d',
                '--color-surface-container-highest': '#2d3449',
                '--color-surface-variant': '#2d3449',
                '--color-background': '#0b1326',
                '--color-primary': '#57f1db',
                '--color-on-primary': '#003731',
                '--color-primary-container': '#2dd4bf',
                '--color-on-primary-container': '#00574d',
                '--color-error': '#ffb4ab',
                '--color-error-container': '#93000a',
                '--color-originator-court': '#0369a1',
                '--color-originator-opposing': '#b91c1c',
                '--color-originator-own': '#047857',
                '--color-originator-unknown': '#859490',
                '--color-on-surface': '#dae2fd',
                '--color-on-surface-variant': '#bacac5',
                '--color-on-background': '#dae2fd',
                '--color-outline': '#859490',
                '--color-outline-variant': '#3c4a46',
            };

            window.setSiteTheme = (mode) => {
                const isDark = mode === 'dark';
                const theme = isDark ? darkTheme : lightTheme;

                Object.entries(theme).forEach(([key, value]) => {
                    root.style.setProperty(key, value);
                });
                root.classList.toggle('dark', isDark);
                body.classList.toggle('dark', isDark);
                localStorage.setItem('site-theme', isDark ? 'dark' : 'light');
                window.dispatchEvent(new CustomEvent('site-theme-changed', {
                    detail: { mode: isDark ? 'dark' : 'light' }
                }));
            };

            window.toggleSiteTheme = () => {
                const nextMode = root.classList.contains('dark') ? 'light' : 'dark';
                window.setSiteTheme(nextMode);
            };

            window.syncHeaderThemeControls = () => {
                const isDark = root.classList.contains('dark');
                document.querySelectorAll('[data-theme-icon]').forEach((icon) => {
                    icon.textContent = isDark ? 'light_mode' : 'dark_mode';
                });
                document.querySelectorAll('[data-theme-toggle]').forEach((button) => {
                    button.title = isDark ? 'Switch to light mode' : 'Switch to dark mode';
                });
            };

            window.showShellToast = ({ title, body, icon = 'info' }) => {
                if (!toastHost) return;

                const toast = document.createElement('div');
                toast.className = 'pointer-events-auto rounded-xl border border-outline-variant/20 bg-surface-container px-4 py-3 shadow-xl text-sm text-on-surface';
                toast.innerHTML = `
                    <div class="flex items-start gap-3">
                        <span class="material-symbols-outlined text-primary text-[18px]">${icon}</span>
                        <div>
                            <p class="font-bold text-on-surface">${title}</p>
                            <p class="text-xs text-on-surface-variant mt-1">${body}</p>
                        </div>
                    </div>
                `;
                toastHost.appendChild(toast);
                window.setTimeout(() => {
                    toast.remove();
                }, 2200);
            };

            window.showShellPlaceholder = (label) => {
                window.showShellToast({
                    title: label,
                    body: 'This control is a placeholder for now.',
                    icon: 'info',
                });
            };

            window.renderDocumentPaneLoading = () => `
                <section class="flex-1 flex flex-col bg-surface-container-low h-full overflow-hidden w-full">
                    <div class="h-[70%] border-b border-outline-variant/10 relative overflow-hidden flex flex-col">
                        <div class="px-8 py-4 bg-surface-container-low/80 backdrop-blur-xl sticky top-0 z-40 flex items-center justify-between border-b border-outline-variant/10">
                            <h4 class="text-lg font-black tracking-tighter text-on-surface uppercase">Document Preview</h4>
                            <div class="inline-flex items-center gap-2 text-xs font-bold uppercase tracking-widest text-primary">
                                <span class="material-symbols-outlined text-sm animate-spin">progress_activity</span>
                                Loading
                            </div>
                        </div>
                        <div class="flex-1 p-8 overflow-y-auto bg-surface-container/40">
                            <div class="animate-pulse space-y-6">
                                <div class="h-7 w-2/3 rounded bg-surface-container-high"></div>
                                <div class="rounded-xl border border-outline-variant/10 bg-surface-container-lowest p-6 space-y-3">
                                    <div class="h-3 w-full rounded bg-surface-container-high"></div>
                                    <div class="h-3 w-5/6 rounded bg-surface-container-high"></div>
                                    <div class="h-3 w-4/5 rounded bg-surface-container-high"></div>
                                    <div class="h-3 w-11/12 rounded bg-surface-container-high"></div>
                                    <div class="h-3 w-3/4 rounded bg-surface-container-high"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="p-6 bg-primary-container/10 border-b border-outline-variant/10 flex-shrink-0">
                        <div class="animate-pulse space-y-3">
                            <div class="h-3 w-36 rounded bg-primary/20"></div>
                            <div class="h-3 w-full rounded bg-surface-container-high"></div>
                            <div class="h-3 w-5/6 rounded bg-surface-container-high"></div>
                            <div class="h-3 w-4/6 rounded bg-surface-container-high"></div>
                        </div>
                    </div>
                    <div class="h-[30%] min-h-[200px] p-8 overflow-y-auto custom-scrollbar">
                        <div class="animate-pulse space-y-4">
                            <div class="h-3 w-28 rounded bg-surface-container-high"></div>
                            <div class="grid grid-cols-1 xl:grid-cols-3 gap-4">
                                <div class="h-24 rounded-xl bg-surface-container-low"></div>
                                <div class="h-24 rounded-xl bg-surface-container-low"></div>
                                <div class="h-24 rounded-xl bg-surface-container-low"></div>
                            </div>
                        </div>
                    </div>
                </section>
            `;

            document.body.addEventListener('htmx:beforeRequest', (event) => {
                const target = event.detail?.target;
                if (target && target.id === 'document-pane') {
                    target.innerHTML = window.renderDocumentPaneLoading();
                }
            });

            document.body.addEventListener('htmx:responseError', () => {
                window.showShellToast({
                    title: 'Request failed',
                    body: 'The update did not complete. Please try again.',
                    icon: 'error',
                });
            });

            window.setSiteTheme(root.classList.contains('dark') ? 'dark' : 'light');
            window.syncHeaderThemeControls();
            window.addEventListener('site-theme-changed', window.syncHeaderThemeControls);
        })();
    </script>
</body>
</html>
