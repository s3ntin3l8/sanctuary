<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>{% block title %}The Sanctuary | Personal Advocate Case Workspace{% endblock %}</title>
    <script>
        (() => {
            const savedTheme = localStorage.getItem('site-theme');
            const root = document.documentElement;
            const lightTheme = {
                '--color-surface-container-lowest': '#ffffff',
                '--color-surface': '#f8fafb',
                '--color-surface-dim': '#cfdce0',
                '--color-surface-bright': '#f8fafb',
                '--color-surface-container-low': '#f0f4f6',
                '--color-surface-container': '#e8eff1',
                '--color-surface-container-high': '#e1eaec',
                '--color-surface-container-highest': '#d9e4e8',
                '--color-surface-variant': '#d9e4e8',
                '--color-background': '#f8fafb',
                '--color-primary': '#45636b',
                '--color-on-primary': '#ecfaff',
                '--color-primary-container': '#c8e8f2',
                '--color-on-primary-container': '#38565e',
                '--color-error': '#9f403d',
                '--color-error-container': '#fe8983',
                '--color-originator-court': '#0369a1',
                '--color-originator-opposing': '#b91c1c',
                '--color-originator-own': '#047857',
                '--color-originator-unknown': '#64748b',
                '--color-on-surface': '#2a3437',
                '--color-on-surface-variant': '#566164',
                '--color-on-background': '#2a3437',
                '--color-outline': '#727d80',
                '--color-outline-variant': '#a9b4b7',
            };
            const darkTheme = {
                '--color-surface-container-lowest': '#060e20',
                '--color-surface': '#0b1326',
                '--color-surface-dim': '#0b1326',
                '--color-surface-bright': '#31394d',
                '--color-surface-container-low': '#131b2e',
                '--color-surface-container': '#171f33',
                '--color-surface-container-high': '#222a3d',
                '--color-surface-container-highest': '#2d3449',
                '--color-surface-variant': '#2d3449',
                '--color-background': '#0b1326',
                '--color-primary': '#57f1db',
                '--color-on-primary': '#003731',
                '--color-primary-container': '#2dd4bf',
                '--color-on-primary-container': '#00574d',
                '--color-error': '#ffb4ab',
                '--color-error-container': '#93000a',
                '--color-originator-court': '#0369a1',
                '--color-originator-opposing': '#b91c1c',
                '--color-originator-own': '#047857',
                '--color-originator-unknown': '#859490',
                '--color-on-surface': '#dae2fd',
                '--color-on-surface-variant': '#bacac5',
                '--color-on-background': '#dae2fd',
                '--color-outline': '#859490',
                '--color-outline-variant': '#3c4a46',
            };
            const theme = savedTheme === 'dark' ? darkTheme : lightTheme;

            Object.entries(theme).forEach(([key, value]) => {
                root.style.setProperty(key, value);
            });
            root.classList.toggle('dark', savedTheme === 'dark');
        })();
    </script>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&family=Inter:wght@300..700&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    
    <!-- Tailwind CSS Compiled Styles -->
    <link href="/static/styles.css" rel="stylesheet"/>
</head>
<body class="bg-background font-body text-on-surface flex h-screen overflow-hidden">
    {% include 'partials/sidebar.html' %}
    
    <!-- Main Workspace Container -->
    <main class="flex-1 flex overflow-hidden">
        {% block content %}{% endblock %}
    </main>
    <script>
        (() => {
            const root = document.documentElement;
            const body = document.body;
            const lightTheme = {
                '--color-surface-container-lowest': '#ffffff',
                '--color-surface': '#f8fafb',
                '--color-surface-dim': '#cfdce0',
                '--color-surface-bright': '#f8fafb',
                '--color-surface-container-low': '#f0f4f6',
                '--color-surface-container': '#e8eff1',
                '--color-surface-container-high': '#e1eaec',
                '--color-surface-container-highest': '#d9e4e8',
                '--color-surface-variant': '#d9e4e8',
                '--color-background': '#f8fafb',
                '--color-primary': '#45636b',
                '--color-on-primary': '#ecfaff',
                '--color-primary-container': '#c8e8f2',
                '--color-on-primary-container': '#38565e',
                '--color-error': '#9f403d',
                '--color-error-container': '#fe8983',
                '--color-originator-court': '#0369a1',
                '--color-originator-opposing': '#b91c1c',
                '--color-originator-own': '#047857',
                '--color-originator-unknown': '#64748b',
                '--color-on-surface': '#2a3437',
                '--color-on-surface-variant': '#566164',
                '--color-on-background': '#2a3437',
                '--color-outline': '#727d80',
                '--color-outline-variant': '#a9b4b7',
            };
            const darkTheme = {
                '--color-surface-container-lowest': '#060e20',
                '--color-surface': '#0b1326',
                '--color-surface-dim': '#0b1326',
                '--color-surface-bright': '#31394d',
                '--color-surface-container-low': '#131b2e',
                '--color-surface-container': '#171f33',
                '--color-surface-container-high': '#222a3d',
                '--color-surface-container-highest': '#2d3449',
                '--color-surface-variant': '#2d3449',
                '--color-background': '#0b1326',
                '--color-primary': '#57f1db',
                '--color-on-primary': '#003731',
                '--color-primary-container': '#2dd4bf',
                '--color-on-primary-container': '#00574d',
                '--color-error': '#ffb4ab',
                '--color-error-container': '#93000a',
                '--color-originator-court': '#0369a1',
                '--color-originator-opposing': '#b91c1c',
                '--color-originator-own': '#047857',
                '--color-originator-unknown': '#859490',
                '--color-on-surface': '#dae2fd',
                '--color-on-surface-variant': '#bacac5',
                '--color-on-background': '#dae2fd',
                '--color-outline': '#859490',
                '--color-outline-variant': '#3c4a46',
            };

            window.setSiteTheme = (mode) => {
                const isDark = mode === 'dark';
                const theme = isDark ? darkTheme : lightTheme;

                Object.entries(theme).forEach(([key, value]) => {
                    root.style.setProperty(key, value);
                });
                root.classList.toggle('dark', isDark);
                body.classList.toggle('dark', isDark);
                localStorage.setItem('site-theme', isDark ? 'dark' : 'light');
                window.dispatchEvent(new CustomEvent('site-theme-changed', {
                    detail: { mode: isDark ? 'dark' : 'light' }
                }));
            };

            window.toggleSiteTheme = () => {
                const nextMode = root.classList.contains('dark') ? 'light' : 'dark';
                window.setSiteTheme(nextMode);
            };

            window.setSiteTheme(root.classList.contains('dark') ? 'dark' : 'light');
        })();
    </script>
</body>
</html>
