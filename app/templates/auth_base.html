<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>{% block title %}Sign in | The Sanctuary{% endblock %}</title>
    <link rel="icon" type="image/x-icon" href="/static/favicon.png?v=1.0.4" />

    <!-- Zero-flicker theme bootstrap (mirrors base.html, sidebar-free). -->
    <script>
        (function () {
            const savedTheme = localStorage.getItem('site-theme');
            const userSettings = JSON.parse(localStorage.getItem('user-settings') || 'null');
            const theme = savedTheme || (userSettings ? userSettings.theme : null) || 'dark';
            if (theme === 'dark') document.documentElement.classList.add('dark');
        })();
    </script>

    <link href="/static/fonts.css?v=1.0.5" rel="stylesheet" />
    <link href="/static/styles.css?v=1.0.5" rel="stylesheet" />
</head>

<body class="bg-background font-body text-on-surface flex h-screen overflow-hidden">
    <main class="flex-1 flex items-center justify-center p-6">
        <div class="w-full max-w-sm">
            <div class="flex flex-col items-center mb-8">
                <div class="w-12 h-12 rounded-2xl bg-primary-container/30 border border-primary/20 flex items-center justify-center mb-3">
                    <span class="material-symbols-outlined text-2xl text-primary">shield_lock</span>
                </div>
                <h1 class="text-lg font-black tracking-tight text-on-surface">The Sanctuary</h1>
                <p class="text-xs text-on-surface-variant mt-1">{% block subtitle %}Secure case workspace{% endblock %}</p>
            </div>

            {% if error %}
            <div class="mb-4 px-3 py-2 rounded-lg bg-error-container/30 border border-error/30 text-error text-xs font-medium">
                {{ error }}
            </div>
            {% endif %}

            <div class="bg-surface-container rounded-2xl border border-outline-variant/20 shadow-xl p-6">
                {% block auth_body %}{% endblock %}
            </div>

            {% block auth_footer %}{% endblock %}
        </div>
    </main>
</body>

</html>
