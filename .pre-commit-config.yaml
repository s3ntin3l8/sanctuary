repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
    -   id: trailing-whitespace
    -   id: end-of-file-fixer
    -   id: check-yaml
    -   id: check-added-large-files

-   repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.16
    hooks:
    -   id: ruff
        args: [ --fix ]
    -   id: ruff-format

-   repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
    -   id: detect-secrets
        args: ['--baseline', '.secrets.baseline']

-   repo: local
    hooks:
    -   id: unit-tests
        name: run unit tests
        entry: .venv/bin/python -m pytest -m unit --ignore=tests/e2e
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-push]
    -   id: integration-tests
        name: run integration tests
        entry: .venv/bin/python -m pytest -m integration
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-push]
