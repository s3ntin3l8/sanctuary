<!doctype html>
<html lang="en" class="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Sanctuary — Home</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  :root {
    --surface-lowest:#ffffff;
    --surface:#f8fafb;
    --surface-low:#f0f4f6;
    --surface-container:#e8eff1;
    --surface-high:#e1eaec;
    --surface-highest:#d9e4e8;
    --surface-variant:#d9e4e8;
    --on-surface:#2a3437;
    --on-surface-variant:#566164;
    --primary:#45636b;
    --primary-container:#c8e8f2;
    --on-primary:#ecfaff;
    --outline:#727d80;
    --outline-variant:#a9b4b7;
    --inverse-surface:#0b0f10;
    --originator-court:#0369a1;
    --originator-opposing:#b91c1c;
    --originator-own:#047857;
    --originator-third:#b45309;
    --originator-unknown:#64748b;
    --amber:#d97706;
    --amber-glow: rgba(217,119,6,0.18);
    --critical:#dc2626;
    --near:#ca8a04;
  }
  .dark {
    --surface-lowest:#060e20;
    --surface:#0b1326;
    --surface-low:#131b2e;
    --surface-container:#171f33;
    --surface-high:#222a3d;
    --surface-highest:#2d3449;
    --surface-variant:#2d3449;
    --on-surface:#dae2fd;
    --on-surface-variant:#bacac5;
    --primary:#57f1db;
    --primary-container:#1a4f47;
    --on-primary:#003731;
    --outline:#859490;
    --outline-variant:#3c4a46;
    --inverse-surface:#dae2fd;
    --originator-court:#38bdf8;
    --originator-opposing:#f87171;
    --originator-own:#34d399;
    --originator-third:#fbbf24;
    --originator-unknown:#94a3b8;
    --amber:#fbbf24;
    --amber-glow: rgba(251,191,36,0.22);
    --critical:#f87171;
    --near:#fbbf24;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  html, body, #root { height: 100%; }
  body {
    background: var(--surface);
    color: var(--on-surface);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
  }
  .font-headline { font-family: 'Manrope', sans-serif; letter-spacing: -0.01em; }
  .font-mono { font-family: 'JetBrains Mono', monospace; }

  .custom-scrollbar::-webkit-scrollbar { width: 8px; height: 8px; }
  .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
  .custom-scrollbar::-webkit-scrollbar-thumb { background: var(--outline-variant); border-radius: 10px; }

  .kbd {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px;
    padding: 2px 5px;
    border: 1px solid var(--outline-variant);
    border-bottom-width: 2px;
    border-radius: 4px;
    color: var(--on-surface-variant);
    background: var(--surface-lowest);
    line-height: 1;
  }
  .divider { height: 1px; background: var(--outline-variant); opacity: 0.5; }
  .row-hover:hover { background: var(--surface-low); }

  .line-clamp-2 {
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .tweaks {
    position: fixed; right: 16px; bottom: 16px; width: 280px; z-index: 60;
    background: var(--surface-container);
    border: 1px solid var(--outline-variant);
    border-radius: 10px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    padding: 14px;
  }

  .density-compact .py-2 { padding-top: 4px; padding-bottom: 4px; }
  .density-comfortable .py-2 { padding-top: 10px; padding-bottom: 10px; }

  .focus-ring:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; border-radius: 6px; }
</style>
</head>
<body>
  <div id="root"></div>

  <script>
    window.__TWEAKS__ = /*EDITMODE-BEGIN*/{
      "theme": "light",
      "density": "compact",
      "state": "default",
      "lastVisit": "6h",
      "graphFilter": "all",
      "activeView": "graph"
    }/*EDITMODE-END*/;
  </script>

  <script type="text/babel" src="src/icons.jsx"></script>
  <script type="text/babel" src="src/rail.jsx"></script>
  <script type="text/babel" src="src/home_data.jsx"></script>
  <script type="text/babel" src="src/home_panels.jsx"></script>
  <script type="text/babel" src="src/home_app.jsx"></script>
</body>
</html>
